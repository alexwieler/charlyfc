<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa FC26 · Charly Fútbol Club</title>
<meta name="description" content="La Primera Copa FC26 del Charly Fútbol Club. Fixture y tabla de posiciones.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef1f7;
  --surface:#ffffff;
  --ink:#152142;
  --muted:#6b7794;
  --red:#d81e34;
  --red-d:#b3162a;
  --blue:#173a8a;
  --blue-b:#1e50c8;
  --line:#e4e9f3;
  --win:#1fa25a;
  --draw:#c9862a;
  --loss:#d64158;
  --shadow:0 6px 22px rgba(21,33,66,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(700px 380px at 8% -8%, rgba(30,80,200,.07), transparent 60%),
    radial-gradient(700px 380px at 95% -6%, rgba(216,30,52,.07), transparent 60%);}
a{color:inherit;text-decoration:none}
.wrap{max-width:1080px;margin:0 auto;padding:0 20px}
.eyebrow{font-family:'Oswald';letter-spacing:.2em;text-transform:uppercase;font-size:.72rem;color:var(--red);font-weight:600}
.section{padding:40px 0}
.sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:18px;flex-wrap:wrap}
h2.st{font-family:'Anton';font-weight:400;text-transform:uppercase;letter-spacing:.02em;font-size:clamp(1.5rem,4.5vw,2.2rem);line-height:1}
h2.st .ac{color:var(--blue)}

/* accent bar */
.accent{height:4px;background:linear-gradient(90deg,var(--red) 0 50%,var(--blue) 50% 100%)}

/* HEADER */
header.top{background:var(--surface);border-bottom:1px solid var(--line);box-shadow:var(--shadow)}
.top-in{display:flex;align-items:center;gap:16px;padding:16px 0}
.top-in .crest{width:52px;height:52px;flex-shrink:0}
.top-txt .kick{font-family:'Oswald';text-transform:uppercase;letter-spacing:.18em;font-size:.68rem;color:var(--muted);font-weight:600}
.top-txt h1{font-family:'Anton';text-transform:uppercase;font-size:clamp(1.5rem,5vw,2.3rem);line-height:1;letter-spacing:.01em;margin-top:2px}
.top-txt h1 .r{color:var(--red)}
.top-txt h1 .b{color:var(--blue)}
.top-nav{margin-left:auto;display:flex;gap:4px}
.top-nav a{font-family:'Oswald';text-transform:uppercase;letter-spacing:.08em;font-size:.76rem;font-weight:500;color:var(--muted);padding:8px 12px;border-radius:8px;transition:.2s}
.top-nav a:hover{color:var(--ink);background:var(--bg)}

/* PRIZE LINE */
.prize-line{background:linear-gradient(100deg,var(--red-d),var(--blue));color:#fff;text-align:center;padding:13px 20px}
.prize-line .in{font-family:'Oswald';font-weight:500;letter-spacing:.02em;font-size:clamp(.85rem,2.4vw,1.02rem)}
.prize-line b{font-weight:700}
.prize-line .cup{font-weight:700}

/* DUPLAS */
.duplas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.dupla{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;transition:.2s}
.dupla:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(21,33,66,.14)}
.dupla .d-top{display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid var(--line)}
.dupla .d-flag{width:44px;height:30px;border-radius:4px;object-fit:cover;box-shadow:0 1px 4px rgba(0,0,0,.25);flex-shrink:0}
.dupla .d-flag.tbd{display:grid;place-items:center;background:linear-gradient(135deg,var(--red),var(--blue));font-size:1rem}
.dupla .d-meta{min-width:0}
.dupla .d-num{font-family:'Oswald';text-transform:uppercase;letter-spacing:.12em;font-size:.66rem;color:var(--muted);font-weight:600}
.dupla .d-sel{font-family:'Oswald';font-weight:700;text-transform:uppercase;font-size:1rem;line-height:1.1;color:var(--blue);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dupla .d-sel.tbd{color:var(--red)}
.dupla .d-players{padding:11px 14px;display:flex;flex-direction:column;gap:7px}
.dupla .pl{display:flex;align-items:center;gap:9px;font-weight:600;font-size:.92rem}
.dupla .pl .av{width:26px;height:26px;border-radius:50%;background:var(--bg);border:1px solid var(--line);display:grid;place-items:center;font-family:'Oswald';font-weight:700;font-size:.78rem;color:var(--blue)}

/* TABLA */
.panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:.92rem}
thead th{font-family:'Oswald';text-transform:uppercase;letter-spacing:.06em;font-size:.68rem;color:var(--muted);text-align:center;padding:13px 6px;background:#f7f9fd;font-weight:600;border-bottom:1px solid var(--line)}
thead th.left{text-align:left;padding-left:16px}
tbody td{text-align:center;padding:11px 6px;border-bottom:1px solid var(--line)}
tbody tr:last-child td{border-bottom:none}
tbody td.left{text-align:left;padding-left:12px}
.pos{font-family:'Anton';font-size:1rem;width:30px;color:var(--muted)}
tbody tr.champ .pos{color:var(--red)}
tbody tr.champ{background:linear-gradient(90deg,rgba(216,30,52,.06),transparent)}
.team-cell{display:flex;align-items:center;gap:10px}
.team-cell .fl{width:26px;height:17px;border-radius:3px;object-fit:cover;box-shadow:0 1px 3px rgba(0,0,0,.25);flex-shrink:0}
.team-cell .fl.tbd{background:linear-gradient(135deg,var(--red),var(--blue))}
.team-cell .ti{display:flex;flex-direction:column;line-height:1.15;min-width:0}
.team-cell .ti .tp{font-weight:700;font-size:.9rem}
.team-cell .ti .ts{font-size:.7rem;color:var(--muted)}
td.pts{font-family:'Anton';font-size:1.1rem;color:var(--red)}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:.76rem;color:var(--muted)}
.legend .dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:6px;vertical-align:middle;background:var(--red)}

/* FIXTURE */
.jornada{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px}
.j-head{display:flex;align-items:center;gap:11px;padding:13px 16px;cursor:pointer;user-select:none;background:#f7f9fd}
.j-head .jn{font-family:'Anton';text-transform:uppercase;font-size:1.02rem;letter-spacing:.02em}
.j-head .jn small{color:var(--red)}
.j-head .jd{font-family:'Oswald';text-transform:uppercase;letter-spacing:.08em;font-size:.68rem;color:var(--muted)}
.j-head .chev{margin-left:auto;color:var(--muted);transition:.25s}
.jornada.open .chev{transform:rotate(180deg)}
.j-body{display:none;padding:4px 12px 10px}
.jornada.open .j-body{display:block}
.match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;padding:11px 6px;border-bottom:1px solid var(--line)}
.match:last-child{border-bottom:none}
.match .team{display:flex;align-items:center;gap:9px;min-width:0}
.match .team.home{justify-content:flex-end;text-align:right}
.match .team .nm{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.match .team .sub{font-size:.68rem;color:var(--muted);display:block;line-height:1}
.match .team .col{display:flex;flex-direction:column;min-width:0}
.match .team.home .col{align-items:flex-end}
.match .team .fl{width:24px;height:16px;border-radius:3px;object-fit:cover;box-shadow:0 1px 3px rgba(0,0,0,.25);flex-shrink:0}
.match .team .fl.tbd{background:linear-gradient(135deg,var(--red),var(--blue))}
.match .team.home .fl{order:2}
.score{font-family:'Anton';font-size:1.25rem;min-width:70px;text-align:center;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:4px}
.score.pending{color:var(--muted);font-family:'Oswald';font-size:.86rem;letter-spacing:.1em}

footer{text-align:center;padding:34px 0 40px;color:var(--muted);font-size:.8rem}
footer .crest{width:44px;height:44px;margin:0 auto 10px;opacity:.9}
footer .fn{font-family:'Anton';text-transform:uppercase;font-size:1rem;color:var(--ink)}
.note{background:#eaf0ff;border:1px dashed #b9ccff;border-radius:12px;padding:12px 16px;color:#2b4a94;font-size:.82rem;margin-top:14px}

@media(max-width:820px){
  .duplas-grid{grid-template-columns:repeat(2,1fr)}
  .top-nav{display:none}
}
@media(max-width:520px){
  .duplas-grid{grid-template-columns:1fr}
  thead th.hide,tbody td.hide{display:none}
}
.cuadros-strip{display:flex;flex-wrap:wrap;gap:10px}
.pchip{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:8px 13px 8px 10px;box-shadow:var(--shadow)}
.pchip img{width:30px;height:20px;border-radius:3px;object-fit:cover;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.pchip .pcn{font-family:'Oswald';font-weight:600;text-transform:uppercase;letter-spacing:.03em;font-size:.9rem;line-height:1.1}
.pchip .pcs{font-size:.68rem;color:var(--win);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.pchip.taken{opacity:.55}
.pchip.taken .pcs{color:var(--muted)}
</style>
</head>
<body>


<div class="accent"></div>
<header class="top">
  <div class="wrap top-in">
    <img class="crest" style="border-radius:50%;object-fit:cover" src="charly.png" alt="Charly FC">
    <div class="top-txt">
      <div class="kick">Charly Fútbol Club · Torneo FC26</div>
      <h1>Copa <span class="r">FC</span><span class="b">26</span></h1>
    </div>
    <nav class="top-nav">
      <a href="#duplas">Parejas</a>
      <a href="#tabla">Tabla</a>
      <a href="#fixture">Fixture</a>
    </nav>
  </div>
</header>

<!-- CUADROS -->
<section class="section" id="cuadros" style="padding-bottom:6px">
  <div class="wrap">
    <div class="sec-head"><h2 class="st">Países <span class="ac">en juego</span></h2></div>
    <div class="cuadros-strip" id="cuadros-strip"></div>
  </div>
</section>

<!-- DUPLAS -->
<section class="section" id="duplas">
  <div class="wrap">
    <div class="sec-head">
      <h2 class="st">Parejas</h2>
    </div>
    <div class="duplas-grid" id="duplas-grid"></div>
  </div>
</section>

<!-- TABLA -->
<section class="section" id="tabla">
  <div class="wrap">
    <div class="sec-head">
      <h2 class="st">Tabla de <span class="ac">Posiciones</span></h2>
    </div>
    <div class="panel">
      <table>
        <thead>
          <tr>
            <th>#</th><th class="left">Dupla</th>
            <th>PJ</th><th>G</th><th>E</th><th>P</th>
            <th class="hide">GF</th><th class="hide">GC</th><th>DIF</th><th>PTS</th>
          </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
      </table>
    </div>
    <div class="legend">
      <span><span class="dot"></span>1° Campeón</span>
      <span>PJ jugados · G ganados · E empatados · P perdidos · DIF dif. de gol · PTS puntos</span>
    </div>
  </div>
</section>

<!-- FIXTURE -->
<section class="section" id="fixture">
  <div class="wrap">
    <div class="sec-head">
      <h2 class="st">El <span class="ac">Fixture</span></h2>
    </div>
    <div id="fixture-list"></div>
  </div>
</section>

<footer>
  <div class="wrap">
    <img class="crest" style="border-radius:50%;object-fit:cover" src="charly.png" alt="Charly FC">
    <div class="fn">Charly Fútbol Club · 2022</div>
    <p>Copa FC26 · La Primera</p>
  </div>
</footer>

<script>
/* ===== DATOS DEL TORNEO — editá acá y todo se actualiza ===== */

// Selecciones en juego (4 estrellas). code = bandera (flagcdn).
const SELECCIONES = [
  {code:'hr', name:'Croacia'},
  {code:'uy', name:'Uruguay'},
  {code:'tr', name:'Turquía'},
  {code:'ma', name:'Marruecos'},
  {code:'sn', name:'Senegal'},
  {code:'no', name:'Noruega'},
];

// 6 duplas. sel = índice de SELECCIONES (o null = "a sortear" hasta el día del partido).
const PAREJAS = [
  {id:1, jugadores:['Beco','Alex'], sel:2},
  {id:2, jugadores:['Gasti','Cachito','Guille'], sel:5},
  {id:3, jugadores:['Cesar','Coto'], sel:0},
  {id:4, jugadores:['Emi','Nico Rocha'], sel:4},
  {id:5, jugadores:['Chala','Rodo'], sel:1},
  {id:6, jugadores:['Hincha','Perú'], sel:3},
];

// Fixture liga (6 equipos = 5 fechas x 3). gh/ga null = sin jugar.
const FIXTURE = [
  {fecha:1, partidos:[ {h:1,a:6,gh:3,ga:2}, {h:2,a:5,gh:4,ga:6}, {h:3,a:4,gh:1,ga:1} ]},
  {fecha:2, partidos:[ {h:5,a:6,gh:5,ga:2}, {h:1,a:4,gh:3,ga:6}, {h:2,a:3,gh:3,ga:1} ]},
  {fecha:3, partidos:[ {h:4,a:6,gh:null,ga:null}, {h:5,a:3,gh:null,ga:null}, {h:1,a:2,gh:null,ga:null} ]},
  {fecha:4, partidos:[ {h:3,a:6,gh:null,ga:null}, {h:4,a:2,gh:null,ga:null}, {h:5,a:1,gh:null,ga:null} ]},
  {fecha:5, partidos:[ {h:2,a:6,gh:null,ga:null}, {h:3,a:1,gh:null,ga:null}, {h:4,a:5,gh:null,ga:null} ]},
];

/* ===== RENDER (no hace falta tocar) ===== */
const flag=c=>`https://flagcdn.com/w80/${c}.png`;
const P=id=>PAREJAS.find(p=>p.id===id);
const nombre=p=>{const k=(p.jugadores||[]).map(j=>j&&(''+j).trim()?j:'?');return k.length? k.join(' + ') : 'Pareja '+p.id;};
const selDe=p=>(p.sel!=null?SELECCIONES[p.sel]:null);

// Duplas
document.getElementById('duplas-grid').innerHTML=PAREJAS.map(p=>{
  const s=selDe(p);
  const fl=s?`<img class="d-flag" src="${flag(s.code)}" alt="${s.name}">`:`<div class="d-flag tbd">?</div>`;
  const sel=s?`<div class="d-sel">${s.name}</div>`:`<div class="d-sel tbd">?</div>`;
  const pls=(p.jugadores&&p.jugadores.length)
    ? `<div class="d-players">${p.jugadores.map(j=>`<div class="pl"><span class="av">${j.trim().charAt(0).toUpperCase()}</span>${j}</div>`).join('')}</div>`
    : '';
  return `<div class="dupla">
    <div class="d-top">${fl}<div class="d-meta"><div class="d-num">Pareja ${p.id}</div>${sel}</div></div>
    ${pls}</div>`;
}).join('');

// Países en juego
document.getElementById('cuadros-strip').innerHTML=SELECCIONES.map((s,i)=>{
  const taken=PAREJAS.find(p=>p.sel===i);
  return `<div class="pchip ${taken?'taken':''}"><img src="${flag(s.code)}" alt="${s.name}"><div><div class="pcn">${s.name}</div><div class="pcs">${taken?('Tomado · '+nombre(taken)):'Disponible'}</div></div></div>`;
}).join('');

// Tabla
function calc(){
  const t={};PAREJAS.forEach(p=>t[p.id]={id:p.id,pj:0,g:0,e:0,p:0,gf:0,gc:0});
  FIXTURE.forEach(f=>f.partidos.forEach(m=>{
    if(m.gh==null||m.ga==null)return;
    const H=t[m.h],A=t[m.a];H.pj++;A.pj++;H.gf+=m.gh;H.gc+=m.ga;A.gf+=m.ga;A.gc+=m.gh;
    if(m.gh>m.ga){H.g++;A.p++;}else if(m.gh<m.ga){A.g++;H.p++;}else{H.e++;A.e++;}
  }));
  return Object.values(t).map(r=>({...r,dif:r.gf-r.gc,pts:r.g*3+r.e}))
    .sort((a,b)=>b.pts-a.pts||b.dif-a.dif||b.gf-a.gf||a.id-b.id);
}
document.getElementById('tabla-body').innerHTML=calc().map((r,i)=>{
  const p=P(r.id),s=selDe(p);
  const fl=s?`<img class="fl" src="${flag(s.code)}">`:`<div class="fl tbd"></div>`;
  const dif=(r.dif>0?'+':'')+r.dif;
  return `<tr class="${i===0?'champ':''}">
    <td class="pos">${i+1}</td>
    <td class="left"><div class="team-cell">${fl}<div class="ti"><span class="tp">${nombre(p)}</span><span class="ts">${s?s.name:'?'}</span></div></div></td>
    <td>${r.pj}</td><td>${r.g}</td><td>${r.e}</td><td>${r.p}</td>
    <td class="hide">${r.gf}</td><td class="hide">${r.gc}</td><td>${dif}</td><td class="pts">${r.pts}</td></tr>`;
}).join('');

// Fixture
document.getElementById('fixture-list').innerHTML=FIXTURE.map((f,i)=>{
  const anyPlayed=f.partidos.some(m=>m.gh!=null);
  const ms=f.partidos.map(m=>{
    const h=P(m.h),a=P(m.a),sh=selDe(h),sa=selDe(a);
    const played=m.gh!=null&&m.ga!=null;
    const score=played?`<div class="score">${m.gh} - ${m.ga}</div>`:`<div class="score pending">VS</div>`;
    const flh=sh?`<img class="fl" src="${flag(sh.code)}">`:`<div class="fl tbd"></div>`;
    const fla=sa?`<img class="fl" src="${flag(sa.code)}">`:`<div class="fl tbd"></div>`;
    return `<div class="match">
      <div class="team home">${flh}<div class="col"><span class="nm">${nombre(h)}</span><span class="sub">${sh?sh.name:'?'}</span></div></div>
      ${score}
      <div class="team away">${fla}<div class="col"><span class="nm">${nombre(a)}</span><span class="sub">${sa?sa.name:'?'}</span></div></div>
    </div>`;
  }).join('');
  return `<div class="jornada ${i===0||anyPlayed?'open':''}">
    <div class="j-head" onclick="this.parentElement.classList.toggle('open')">
      <span class="jn">Fecha <small>${f.fecha}</small></span><span class="jd">3 partidos</span>
      <span class="chev">▾</span>
    </div>
    <div class="j-body">${ms}</div></div>`;
}).join('');
</script>
</body>
</html>
